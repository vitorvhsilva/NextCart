version: '3.8'

services:
  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sns,sqs,dynamodb
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    command: >
      sh -c "
        echo 'sleep 5' > /etc/localstack/init/ready.d/init.sh &&
        echo 'awslocal dynamodb create-table --table-name tb_cart_events_writer --attribute-definitions AttributeName=event_id,AttributeType=S --key-schema AttributeName=event_id,KeyType=HASH --billing-mode PAY_PER_REQUEST --region us-east-1' >> /etc/localstack/init/ready.d/init.sh &&
        chmod +x /etc/localstack/init/ready.d/init.sh &&
        /docker-entrypoint.sh
      "

  postgres:
    image: postgres:15
    container_name: nextcart-postgres
    environment:
      POSTGRES_USER: cartuser
      POSTGRES_PASSWORD: cartpassword
      POSTGRES_DB: nextcart_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - "./init.sql:/docker-entrypoint-initdb.d/init.sql"

volumes:
  postgres_data:
